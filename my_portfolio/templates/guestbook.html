{% extends "base.html" %}

{% block title %}留言板 - 我的作品集{% endblock %}

{% block content %}
<h1>留言板</h1>
<p>提交后留言保存在浏览器会话中（适合本地学习演示）。</p>

<form method="post" action="{{ url_for('guestbook') }}">
    <p>
        <label for="name">昵称：</label><br>
        <input type="text" id="name" name="name" required maxlength="50">
    </p>
    <p>
        <label for="content">留言：</label><br>
        <textarea id="content" name="content" rows="4" cols="40" required maxlength="500"></textarea>
    </p>
    <p><button type="submit">提交留言</button></p>
</form>

<h2>已有留言</h2>
{% if messages %}
<ul class="guestbook-list">
    {% for m in messages %}
    <li>
        <strong>{{ m.name }}</strong>：{{ m.content }}
    </li>
    {% endfor %}
</ul>
{% else %}
<p>暂无留言，欢迎第一条。</p>
{% endif %}
{% endblock %}
